<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12" *ngIf="item$ | async as item; else loading">
  <nav class="flex items-center space-x-2 text-sm text-slate mb-12">
    <a routerLink="/" class="hover:text-accent transition-colors">Home</a>
    <span>/</span>
    <a [routerLink]="['/category', item.category]" class="hover:text-accent transition-colors">{{ item.category }}</a>
    <span>/</span>
    <span class="text-white font-medium">{{ item.itemname }}</span>
  </nav>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-start">
    <div class="relative group">
      <div class="absolute -inset-4 bg-accent/10 rounded-3xl blur-2xl group-hover:bg-accent/20 transition-all duration-500"></div>
      <div class="relative aspect-[4/3] rounded-2xl overflow-hidden border border-white/10 shadow-2xl">
        <img [src]="item.image" [alt]="item.itemname" class="w-full h-full object-cover">
      </div>
    </div>

    <div class="space-y-10">
      <div class="space-y-4">
        <span class="inline-block px-3 py-1 bg-accent/10 text-accent text-xs font-bold rounded-full uppercase tracking-widest border border-accent/20">
          {{ item.category }}
        </span>
        <h1 class="text-5xl md:text-6xl font-black text-white leading-tight">
          {{ item.itemname }}
        </h1>
      </div>
      
      <div class="bg-white/[0.02] border border-white/5 rounded-3xl p-8 backdrop-blur-sm">
        <h3 class="text-white font-bold text-lg mb-8 uppercase tracking-widest">Specifications</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-8">
          <div *ngFor="let prop of item.itemprops" class="space-y-1 group">
            <p class="text-[10px] text-slate uppercase tracking-[0.2em] font-bold group-hover:text-accent transition-colors">
              {{ prop.label }}
            </p>
            <p class="text-lg text-white font-medium">{{ prop.value }}</p>
          </div>
        </div>
      </div>

      <div class="flex flex-col sm:flex-row gap-4 pt-6">
        <button class="px-10 py-5 bg-accent text-navy font-bold rounded-xl hover:scale-105 active:scale-95 transition-all shadow-lg shadow-accent/20">
          Pre-order Now
        </button>
        <button class="px-10 py-5 bg-white/5 text-white font-semibold rounded-xl hover:bg-white/10 transition-all border border-white/10">
          Technical Details
        </button>
      </div>
    </div>
  </div>
</div>

<ng-template #loading>
  <div class="flex flex-col items-center justify-center py-48 space-y-6">
    <div class="relative w-24 h-24">
      <div class="absolute inset-0 border-4 border-accent/20 rounded-full"></div>
      <div class="absolute inset-0 border-4 border-accent border-t-transparent rounded-full animate-spin"></div>
    </div>
    <p class="text-accent text-sm font-bold tracking-[0.5em] uppercase animate-pulse">Retrieving Specs</p>
  </div>
</ng-template>
